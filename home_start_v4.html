<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0"><title>宵宿 自宅導入 v4</title><link rel="stylesheet" href="styles_v4.css?v=v4home"><style>body{background:#0a0c12}.home-screen{position:fixed;inset:0;display:grid;place-items:center;padding:24px;background:linear-gradient(180deg,#141821,#06080d)}.home-stage{width:min(92vw,760px);border:1px solid rgba(216,193,143,.24);border-radius:28px;overflow:hidden;background:rgba(9,12,20,.94);box-shadow:0 30px 70px rgba(0,0,0,.42)}.home-stage-art{position:relative;height:min(48vw,300px);background:linear-gradient(180deg,#2b231e 0 24%,#5f4938 24% 28%,#d9ccb7 28% 100%)}.home-window{position:absolute;left:7%;top:15%;width:36%;height:36%;background:linear-gradient(180deg,#d8e7f3,#f7f7f1);border:10px solid #4f3828;box-shadow:inset 0 0 0 2px rgba(255,255,255,.25)}.home-window:before,.home-window:after{content:'';position:absolute;background:#5a3e2d}.home-window:before{left:50%;top:0;width:8px;height:100%;transform:translateX(-50%)}.home-window:after{left:0;top:50%;width:100%;height:8px;transform:translateY(-50%)}.home-desk{position:absolute;left:12%;bottom:16%;width:42%;height:16%;background:linear-gradient(180deg,#7e5e45,#5d4231);box-shadow:0 10px 24px rgba(0,0,0,.18)}.home-note-prop{position:absolute;left:24%;bottom:26%;width:13%;height:7%;background:#efe7d4;transform:rotate(-8deg);box-shadow:0 4px 10px rgba(0,0,0,.15)}.home-door-prop{position:absolute;right:8%;top:16%;width:18%;height:56%;background:linear-gradient(180deg,#77604a,#5c4735);border:8px solid #2e231a}.home-door-prop:after{content:'';position:absolute;right:14%;top:48%;width:12px;height:12px;border-radius:50%;background:#d1b37b}.home-futon-prop{position:absolute;right:28%;bottom:14%;width:24%;height:18%;background:linear-gradient(180deg,#efede7,#d9d3c7);border-radius:10px;box-shadow:0 8px 18px rgba(0,0,0,.12)}.home-copy{padding:20px 20px 22px}.home-copy h1{margin:0 0 8px;font-size:30px}.home-copy p{margin:0;color:#d7cfbf;line-height:1.8;white-space:pre-wrap}.home-actions{display:grid;gap:12px;margin-top:18px}.home-btn{appearance:none;border:none;border-radius:18px;padding:15px 20px;width:100%;font-size:18px;font-weight:800;color:#f4f0e5;background:rgba(21,25,39,.98);border:1px solid rgba(216,193,143,.3)}.eyebrow{font-size:12px;letter-spacing:.18em;color:#c5ae82;margin-bottom:8px}.debug{margin-top:10px;font-size:12px;color:#9ea8b4}</style></head><body><div class="crt"></div><main class="home-screen"><section class="home-stage"><div class="home-stage-art"><div class="home-window"></div><div class="home-desk"></div><div class="home-note-prop"></div><div class="home-door-prop"></div><div class="home-futon-prop"></div></div><div class="home-copy"><div class="eyebrow" id="eyebrow">自宅導入</div><h1 id="title">今日から旅館勤務</h1><p id="text">机の上の手紙を読んで、今日の予定を確認する。</p><div class="home-actions" id="actions"></div><div class="debug">home_start_v4.html が見えていれば、黒画面の古いHTMLは回避できています。</div></div></section></main><script>(()=>{const mode=new URLSearchParams(location.search).get('mode')||'day1';const eyebrow=document.getElementById('eyebrow');const title=document.getElementById('title');const text=document.getElementById('text');const actions=document.getElementById('actions');function btn(label,fn){const b=document.createElement('button');b.className='home-btn';b.textContent=label;b.onclick=fn;actions.appendChild(b)}function clear(){actions.innerHTML=''}function showDay1(){eyebrow.textContent='自宅導入';title.textContent='今日から旅館勤務';text.textContent='机の上の手紙を読んで、今日の予定を確認する。';clear();btn('手紙を読む',()=>{text.textContent='今日から、山あいの古い旅館で仕事が始まる。\n女将からの手紙には「昼前までに帳場へ。北廊下には夜まで近づかないこと」とある。';clear();btn('玄関を開ける',()=>location.href='game_core_v4.html?spawn=town_day1&v=v4game')})}function showSleep(){eyebrow.textContent='勤務終了';title.textContent='本日の勤務終了';text.textContent='深夜の見回りを終えた。布団に入って少しだけ眠る。';clear();btn('布団で寝る',()=>{text.textContent='提灯の残像と、赤白の旗が瞼の裏に焼きついている。\n……翌朝。またあの旅館へ向かわなければならない。';clear();btn('翌朝へ',()=>location.href='game_core_v4.html?spawn=town_day2&v=v4game')})}if(mode==='sleep1')showSleep();else showDay1()})();</script></body></html>
